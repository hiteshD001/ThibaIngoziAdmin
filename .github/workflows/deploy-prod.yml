name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    outputs:
      previous_commit: ${{ steps.server_deploy.outputs.previous_commit }}
      deployed_commit: ${{ steps.server_deploy.outputs.deployed_commit }}
    steps:
      - name: Validate secrets exist
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_USER || secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.PORT_PORT || secrets.DEPLOY_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.PROD_PATH || secrets.DEPLOY_PATH }}
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is missing" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is missing" && exit 1)
          test -n "$DEPLOY_PORT" || (echo "DEPLOY_PORT is missing" && exit 1)
          test -n "$SSH_PRIVATE_KEY" || (echo "SSH_PRIVATE_KEY is missing" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "PROD_PATH/DEPLOY_PATH is missing" && exit 1)
          test -n "$PROD_URL" || (echo "PROD_URL is missing" && exit 1)

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY || secrets.SSH_PRIVATE_KEY }}

      - name: Trust server host key
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PORT_PORT || secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${port}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on server with git/build/pm2
        id: server_deploy
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_USER || secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.PORT_PORT || secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.PROD_PATH || secrets.DEPLOY_PATH }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          output="$(
            ssh -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "DEPLOY_PATH='${DEPLOY_PATH}' TARGET_SHA='${TARGET_SHA}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          previous_commit="$(git rev-parse HEAD)"
          git fetch origin
          git checkout -f "${TARGET_SHA}"
          npm ci
          npm run build
          pm2 reload all
          deployed_commit="$(git rev-parse HEAD)"
          echo "PREVIOUS_COMMIT=${previous_commit}"
          echo "DEPLOYED_COMMIT=${deployed_commit}"
          EOF
          )"
          echo "${output}"
          previous_commit="$(printf '%s\n' "${output}" | sed -n 's/^PREVIOUS_COMMIT=//p' | tail -n 1)"
          deployed_commit="$(printf '%s\n' "${output}" | sed -n 's/^DEPLOYED_COMMIT=//p' | tail -n 1)"
          echo "previous_commit=${previous_commit}" >> "${GITHUB_OUTPUT}"
          echo "deployed_commit=${deployed_commit}" >> "${GITHUB_OUTPUT}"

      - name: Smoke check production URL
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          set -euo pipefail
          curl -fsSIL "${PROD_URL}" >/dev/null

      - name: Smoke check critical asset
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          set -euo pipefail
          html="$(curl -fsSL "${PROD_URL}")"
          asset_path="$(printf '%s' "${html}" | sed -n 's/.*src="\([^"]*assets[^"]*\.js\)".*/\1/p' | head -n 1)"
          if [ -z "${asset_path}" ]; then
            echo "No JS asset found in index response"
            exit 1
          fi
          case "${asset_path}" in
            http* ) asset_url="${asset_path}" ;;
            * ) asset_url="${PROD_URL%/}/${asset_path#/}" ;;
          esac
          curl -fsSIL "${asset_url}" >/dev/null

  rollback_on_failure:
    if: ${{ always() && needs.deploy.result == 'failure' }}
    needs: [deploy]
    uses: ./.github/workflows/rollback-prod.yml
    with:
      previous_commit: ${{ needs.deploy.outputs.previous_commit }}
    secrets: inherit
